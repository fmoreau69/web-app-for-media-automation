{% load static %}
<!-- FileManager Sidebar - Always Visible -->
<aside id="filemanager-sidebar">
    <!-- Header -->
    <div class="filemanager-header">
        <h5><i class="fas fa-folder-open me-2"></i>Explorateur</h5>
    </div>

    <!-- Search -->
    <div class="filemanager-search">
        <form autocomplete="off" onsubmit="return false;">
            <input type="search"
                   id="filemanager-tree-filter"
                   class="form-control form-control-sm"
                   placeholder="Rechercher..."
                   autocomplete="off"
                   autocorrect="off"
                   autocapitalize="off"
                   spellcheck="false"
                   data-1p-ignore="true"
                   data-lpignore="true"
                   data-form-type="other"
                   data-bwignore="true"
                   aria-autocomplete="none"
                   role="searchbox">
        </form>
    </div>

    <!-- Drop Zone for Upload + Connect folder -->
    <div id="filemanager-dropzone" class="filemanager-dropzone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Glissez fichiers ou dossiers<br><small>Clic = fichiers | Shift+Clic = dossier</small></p>
    </div>
    <div class="px-2 pb-1" style="border-bottom:1px solid #2a2d30;">
        <button id="btnAddMount"
                class="btn btn-link btn-sm text-muted w-100 text-start px-1"
                style="font-size:0.75rem; text-decoration:none;"
                title="Connecter un dossier distant ou réseau (aucune copie)">
            <i class="fas fa-plug me-1 text-info"></i>Connecter un dossier…
        </button>
    </div>

    <!-- File Tree -->
    <div class="filemanager-tree">
        <div id="filemanager-tree"></div>
    </div>
</aside>

<style>
#mountSmbUser::placeholder,
#mountSmbPassword::placeholder,
#mountSmbDomain::placeholder { color: #6c7a8a; }
</style>

<!-- Modal — Connecter un dossier (connecteur, pas d'import) -->
<div class="modal fade" id="mountModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary py-2">
                <h6 class="modal-title">
                    <i class="fas fa-plug me-2 text-info"></i>Connecter un dossier
                </h6>
                <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="small text-muted mb-3">
                    Les fichiers restent à leur emplacement d'origine — aucune copie.
                </p>
                <div class="mb-3">
                    <label class="form-label small text-light fw-bold mb-1">Chemin du dossier</label>
                    <input type="text" id="mountPathInput"
                           class="form-control form-control-sm bg-dark text-light border-secondary"
                           placeholder="\\serveur\partage\dossier  ou  D:\dossier"
                           autocomplete="off" spellcheck="false">
                    <div id="mountPathStatus" class="mt-1" style="font-size:0.72rem; min-height:1.1rem;"></div>
                </div>
                <!-- Credentials AD (affiché uniquement pour les partages réseau SMB) -->
                <div id="mountSmbSection" class="mb-2 p-2 rounded border border-secondary" style="display:none; font-size:0.8rem;">
                    <div class="mb-2" style="color:#4dd0e1;">
                        <i class="fas fa-network-wired me-1"></i>
                        Partage réseau — identifiants AD (laisser vide pour accès invité)
                    </div>
                    <input type="text" id="mountSmbUser"
                           class="form-control form-control-sm border-secondary mb-1"
                           style="background:#1e2228; color:#dee2e6;"
                           placeholder="Nom d'utilisateur AD" autocomplete="username">
                    <input type="password" id="mountSmbPassword"
                           class="form-control form-control-sm border-secondary mb-1"
                           style="background:#1e2228; color:#dee2e6;"
                           placeholder="Mot de passe AD" autocomplete="current-password">
                    <input type="text" id="mountSmbDomain"
                           class="form-control form-control-sm border-secondary"
                           style="background:#1e2228; color:#dee2e6;"
                           placeholder="Domaine (optionnel, ex : MONDOMAINE)">
                </div>
                <div class="mb-1">
                    <label class="form-label small text-light fw-bold mb-1">Nom d'affichage</label>
                    <input type="text" id="mountNameInput"
                           class="form-control form-control-sm bg-dark text-light border-secondary"
                           placeholder="Ex : Médias Lescot">
                </div>
            </div>
            <div class="modal-footer border-secondary py-2">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Annuler</button>
                <button type="button" id="mountSaveBtn" class="btn btn-sm btn-info" disabled>
                    <i class="fas fa-plug me-1"></i>Connecter
                </button>
            </div>
        </div>
    </div>
</div>

<!-- FileManager Config Script -->
<script>
    window.FILEMANAGER_CONFIG = {
        csrfToken: '{{ csrf_token }}',
        apiTreeUrl: '{% url "filemanager:api_tree" %}',
        apiChildrenUrl: '{% url "filemanager:api_children" %}',
        apiTreeMtimeUrl: '{% url "filemanager:api_tree_mtime" %}',
        apiSearchUrl: '{% url "filemanager:api_search" %}',
        apiUploadUrl: '{% url "filemanager:api_upload" %}',
        apiDeleteUrl: '{% url "filemanager:api_delete" %}',
        apiDeleteAllUrl: '{% url "filemanager:api_delete_all" %}',
        apiRenameUrl: '{% url "filemanager:api_rename" %}',
        apiMoveUrl: '{% url "filemanager:api_move" %}',
        apiInfoUrl: '{% url "filemanager:api_info" %}',
        apiPreviewUrl: '{% url "filemanager:api_preview" %}',
        apiImportUrl: '{% url "filemanager:api_import" %}',
        apiMkdirUrl: '{% url "filemanager:api_mkdir" %}',
        apiDownloadUrl: '/filemanager/api/download/',
        apiValidatePathUrl: '{% url "filemanager:api_validate_path" %}',
        apiMountsUrl: '{% url "filemanager:api_mounts" %}',
        apiMountDeleteUrl: '/filemanager/api/mounts/',
        converterQuickUrl: '{% url "converter:quick_convert" %}',
        converterOutputFormats: {{ converter_output_formats_json|safe }},
    };
</script>

<!-- Modal — Convertir depuis le FileManager -->
<div class="modal fade" id="converterQuickModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content bg-dark text-light border-secondary">
            <div class="modal-header border-secondary py-2">
                <h6 class="modal-title">
                    <i class="fas fa-exchange-alt me-1" style="color:#20c997;"></i>
                    Convertir
                </h6>
                <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2">
                <p class="small text-muted mb-2" id="converterQuickFilename" style="word-break:break-all;"></p>
                <label class="form-label small fw-bold mb-1">Format de sortie</label>
                <select id="converterQuickFormat" class="form-select form-select-sm bg-dark text-light border-secondary">
                    <option value="">— choisissez —</option>
                </select>
                <div id="converterQuickError" class="text-danger small mt-2" style="display:none;"></div>
            </div>
            <div class="modal-footer border-secondary py-2">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button>
                <button type="button" class="btn btn-sm" id="converterQuickConfirmBtn"
                        style="background:#20c997; color:#000;">
                    <i class="fas fa-exchange-alt"></i> Convertir
                </button>
            </div>
        </div>
    </div>
</div>
