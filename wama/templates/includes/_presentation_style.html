    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: none;
            padding: 60px 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-direction: column;
            justify-content: center;
        }

        .slide.active {
            display: flex;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 2.5em;
            margin-bottom: 40px;
            border-bottom: 3px solid rgba(255,255,255,0.3);
            padding-bottom: 20px;
        }

        h3 {
            font-size: 1.8em;
            margin: 30px 0 20px 0;
            color: #ffd700;
        }

        .subtitle {
            font-size: 1.5em;
            opacity: 0.9;
            margin-top: 20px;
        }

        .content {
            font-size: 1.3em;
            line-height: 1.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h4 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .card p {
            font-size: 1.1em;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            margin: 15px 0;
            padding-left: 35px;
            position: relative;
            font-size: 1.2em;
        }

        li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.3em;
        }

        .navigation {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .slide-number {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 1.2em;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 25px;
        }

        .highlight {
            background: rgba(255,215,0,0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            position: relative;
        }

        .timeline:before {
            content: "";
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.3);
        }

        .timeline-item {
            text-align: center;
            flex: 1;
            position: relative;
        }

        .timeline-year {
            background: rgba(255,215,0,0.9);
            color: #333;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .timeline-content {
            font-size: 1em;
            margin-top: 30px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }

        .emoji {
            font-size: 2em;
            margin-right: 15px;
        }
    </style>
