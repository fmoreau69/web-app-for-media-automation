<!-- batch_detect_bar.html
     Reusable batch import bar. Include without parameters.
     Colors: --batch-accent (default #0dcaf0), --batch-bg (#0d1117), --batch-text (#000)
     Type col: add #batchDetectBar .batch-type-col { display:table-cell !important; }
     Requires WamaBatchImport() from common/js/batch-import.js
-->
<div id="batchDetectBar"
     style="display:none; background:var(--batch-bg,#0d1117); border:1px solid var(--batch-accent,#0dcaf0); border-radius:0.375rem; padding:0.5rem 0.75rem; margin-bottom:0.5rem;">

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-1">
        <span class="small text-light">
            <i class="fas fa-list" style="color:var(--batch-accent,#0dcaf0);"></i>
            <strong>Batch</strong> — <span id="batchDetectedCount">0</span> URL(s)
        </span>
        <div class="d-flex gap-1">
            <button class="btn btn-sm py-0 px-2" id="batchPreviewBtn"
                    style="background:var(--batch-accent,#0dcaf0); color:var(--batch-text,#000); font-size:.8rem;">
                <i class="fas fa-eye"></i> Voir
            </button>
            <button class="btn btn-sm btn-outline-danger py-0 px-1" id="batchCancelBar" title="Annuler">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <div id="batchDetectPreview" style="display:none;">
        <div id="batchDetectWarnings" class="alert alert-warning py-1 small mb-1" style="display:none;"></div>
        <div class="table-responsive" style="max-height:140px; overflow-y:auto;">
            <table class="table table-sm table-dark mb-0" style="font-size:0.78rem;">
                <thead style="position:sticky; top:0; background:var(--batch-bg,#0d1117);">
                    <tr>
                        <th>URL / Chemin</th>
                        <th class="batch-type-col" style="display:none; width:var(--batch-type-col-width,10%)">Type</th>
                    </tr>
                </thead>
                <tbody id="batchDetectTable"></tbody>
            </table>
        </div>
        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-success btn-sm flex-grow-1" id="batchCreateAndStartBtn">
                <i class="fas fa-play"></i> Démarrer (<span id="batchCreateCount">0</span>)
            </button>
            <button class="btn btn-outline-primary btn-sm" id="batchCreateOnlyBtn">
                <i class="fas fa-plus"></i> Ajouter
            </button>
        </div>
        <div id="batchCreateProgress" class="mt-2" style="display:none;">
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     style="width:100%; background:var(--batch-accent,#0dcaf0); color:var(--batch-text,#000);">
                    Création…
                </div>
            </div>
        </div>
    </div>
</div>
