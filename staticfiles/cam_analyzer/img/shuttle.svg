<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120" width="60" height="120">
  <!-- Shuttle body (top-down view) -->
  <rect x="8" y="15" width="44" height="90" rx="12" ry="12" fill="#2b3035" stroke="#ffc107" stroke-width="1.5"/>
  <!-- Windshield (front) -->
  <rect x="14" y="20" width="32" height="12" rx="4" fill="#495057" stroke="#6c757d" stroke-width="0.5"/>
  <!-- Rear window -->
  <rect x="14" y="88" width="32" height="10" rx="4" fill="#495057" stroke="#6c757d" stroke-width="0.5"/>
  <!-- Left windows -->
  <rect x="10" y="38" width="4" height="10" rx="1" fill="#495057"/>
  <rect x="10" y="52" width="4" height="10" rx="1" fill="#495057"/>
  <rect x="10" y="66" width="4" height="10" rx="1" fill="#495057"/>
  <!-- Right windows -->
  <rect x="46" y="38" width="4" height="10" rx="1" fill="#495057"/>
  <rect x="46" y="52" width="4" height="10" rx="1" fill="#495057"/>
  <rect x="46" y="66" width="4" height="10" rx="1" fill="#495057"/>
  <!-- Wheels -->
  <rect x="4" y="30" width="6" height="14" rx="3" fill="#6c757d"/>
  <rect x="50" y="30" width="6" height="14" rx="3" fill="#6c757d"/>
  <rect x="4" y="76" width="6" height="14" rx="3" fill="#6c757d"/>
  <rect x="50" y="76" width="6" height="14" rx="3" fill="#6c757d"/>
  <!-- Direction arrow (front) -->
  <polygon points="30,8 24,16 36,16" fill="#ffc107" opacity="0.6"/>
  <!-- Camera indicators -->
  <circle cx="30" cy="17" r="2.5" fill="#ffc107" opacity="0.8"/>
  <circle cx="30" cy="103" r="2.5" fill="#ffc107" opacity="0.8"/>
  <circle cx="7" cy="60" r="2.5" fill="#ffc107" opacity="0.8"/>
  <circle cx="53" cy="60" r="2.5" fill="#ffc107" opacity="0.8"/>
</svg>
